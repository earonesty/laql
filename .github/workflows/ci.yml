name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Full local gate
        run: pnpm check

  external:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Verify vendored external fixture checksums
        run: pnpm fixtures:external -- --verify-only

      - name: Run external conformance lane
        run: pnpm test:conformance
        env:
          LAKEQL_REQUIRE_EXTERNAL_ICEBERG: "1"

  reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run DuckDB reference comparisons
        run: pnpm test:reference

  providers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Start MinIO
        run: |
          docker run -d --name lakeql-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs lakeql-minio
          exit 1

      - name: Start Iceberg REST fixture
        run: |
          docker run -d --name lakeql-iceberg-rest \
            -p 8181:8181 \
            apache/iceberg-rest-fixture:latest
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8181/v1/config >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs lakeql-iceberg-rest
          exit 1

      - name: Run provider conformance
        run: pnpm test:providers
        env:
          LAKEQL_REQUIRE_PROVIDERS: "1"
          LAKEQL_MINIO_ENDPOINT: http://127.0.0.1:9000
          LAKEQL_MINIO_ACCESS_KEY: minioadmin
          LAKEQL_MINIO_SECRET_KEY: minioadmin
          LAKEQL_MINIO_BUCKET: lakeql-provider
          LAKEQL_REST_CATALOG_URL: http://127.0.0.1:8181

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run benchmark harness
        run: pnpm bench

  changeset:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Require changeset for package changes
        run: pnpm check:changeset ${{ github.base_ref }}
