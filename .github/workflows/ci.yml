name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (tsc -b)
        run: pnpm build

      - name: Verify fixtures are reproducible
        run: |
          pnpm fixtures
          git diff --exit-code fixtures/data || (echo "fixtures/data drifted from generator output" && exit 1)

      - name: Test with coverage gate (90%)
        run: pnpm coverage

      - name: Test Workers runtime
        run: pnpm test:workerd

      - name: Test conformance config
        run: pnpm test:conformance
